<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Controllo adesivo</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root{
      --accent:#2c74ff;
      --accent2:#5aa0ff;
      --bg1:#050b14;
      --bg2:#0a1320;
      --panel:#0b1523;
      --line:rgba(255,255,255,.10);
      --text:#f7fbff;
      --muted:#b6c2d4;
      --soft:rgba(255,255,255,.04);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(33,78,166,.22), transparent 28%),
        linear-gradient(180deg, var(--bg1) 0%, #07101b 48%, var(--bg2) 100%);
      color:var(--text)
    }
    .shell{width:min(760px,calc(100% - 24px));margin:0 auto;padding:28px 0 34px}
    .panel{
      border-radius:30px;overflow:hidden;
      background:radial-gradient(circle at 70% 8%, rgba(45,110,240,.12), transparent 24%),linear-gradient(180deg, rgba(11,21,35,.99) 0%, rgba(8,16,27,.995) 100%);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 24px 56px rgba(0,0,0,.38)
    }
    .head{padding:28px 26px 20px}
    .title{
      margin:0;line-height:.94;letter-spacing:-.06em;font-weight:900;
      font-size:clamp(2.2rem,5.5vw,3.7rem);text-transform:uppercase;color:#fff
    }
    .title span{display:block;margin-top:6px;color:var(--accent2);text-shadow:0 0 18px rgba(90,160,255,.22)}
    .line{width:62px;height:5px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));margin:18px 0 14px;box-shadow:0 0 18px rgba(90,160,255,.30)}
    .sub{margin:0;color:var(--muted);font-size:1rem;line-height:1.58;max-width:640px}
    .wrap{padding:22px 26px 26px}
    .card{
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.02) 0%, rgba(255,255,255,.012) 100%);
      border:1px solid var(--line);
      padding:24px
    }
    .card h2{
      margin:0;color:#fff;font-size:1.18rem;font-weight:900;letter-spacing:-.03em;text-transform:uppercase
    }
    .card p{margin:10px 0 18px;color:var(--muted);font-size:.97rem;line-height:1.52}
    .field-label{
      display:block;margin:0 0 10px;color:#fff;font-size:1rem;font-weight:850;text-transform:uppercase
    }
    .field{
      width:100%;border-radius:16px;border:1px solid rgba(255,255,255,.12);
      background:var(--soft);color:#f7fbff;padding:16px 18px;font-size:1rem;outline:none
    }
    .field + .field-label{margin-top:18px}
    .btn{
      width:100%;min-height:58px;margin-top:20px;border:0;border-radius:16px;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      color:#fff;font-size:1.02rem;font-weight:900;cursor:pointer;box-shadow:0 16px 30px rgba(18,85,204,.32)
    }
    .owner-result{
      margin-top:18px;border-radius:22px;padding:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.02) 0%, rgba(255,255,255,.012) 100%);
      border:1px solid rgba(90,160,255,.20);
      color:#d9e4f3
    }
    .owner-result.error{
      border-color:rgba(255,120,120,.35);
      background:rgba(120,0,0,.12);
      color:#ffd2d2
    }
    .owner-result h3{
      margin:0 0 14px;
      color:#fff;
      font-size:1.08rem;
      font-weight:900;
      text-transform:uppercase
    }
    .owner-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:16px
    }
    .owner-stat{
      border-radius:16px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      padding:14px
    }
    .owner-stat .label{
      color:#9fb1c8;
      font-size:.85rem;
      text-transform:uppercase;
      margin-bottom:6px
    }
    .owner-stat .value{
      color:#fff;
      font-size:1rem;
      font-weight:800
    }
    .owner-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap
    }
    .owner-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:50px;
      padding:0 18px;
      border-radius:16px;
      text-decoration:none;
      color:#fff;
      font-weight:900;
      font-size:.96rem
    }
    .owner-link.primary{
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      box-shadow:0 14px 28px rgba(18,85,204,.30)
    }
    .owner-link.secondary{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line)
    }
    @media (max-width:700px){
      .shell{width:min(760px,calc(100% - 16px))}
      .head,.wrap{padding-left:16px;padding-right:16px}
      .owner-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="head">
        <h1 class="title">CONTROLLO<span>ADESIVO</span></h1>
        <div class="line"></div>
        <p class="sub">Accedi con il codice adesivo e la targa del veicolo per verificare stato e attività.</p>
      </div>

      <div class="wrap">
        <div class="card">
          <h2>Accesso proprietario</h2>
          <p>Inserisci i dati esattamente come associati al veicolo attivo.</p>

          <label class="field-label" for="ownerCode">Codice adesivo</label>
          <input id="ownerCode" class="field" type="text" placeholder="Es. AMC-XXXXXXXX">

          <label class="field-label" for="ownerPlate">Targa veicolo</label>
          <input id="ownerPlate" class="field" type="text" placeholder="Es. EY018SW">

          <button class="btn" id="ownerLoginBtn" type="button">Accedi</button>

          <div id="ownerLoginResult"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
