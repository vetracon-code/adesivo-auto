<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifica accesso</title>
  <style>
    :root{
      --bg1:#0c1626;
      --bg2:#16233a;
      --card:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.14);
      --text:#f4f7fb;
      --muted:#c7d2e5;
      --accent:#5aa7ff;
      --accent2:#9ed0ff;
      --danger:#ff8e8e;
      --ok:#9af0b3;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(103,176,255,.16), transparent 28%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .shell{
      width:min(760px,100%);
      border-radius:28px;
      overflow:hidden;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:0 30px 80px rgba(0,0,0,.22);
      backdrop-filter:blur(12px);
    }
    .panel{display:grid;grid-template-columns:1fr}
    .head,.wrap{padding:26px 24px}
    .head{border-bottom:1px solid var(--line)}
    .title{
      margin:0;
      font-size:clamp(1.8rem,4vw,2.6rem);
      font-weight:900;
      letter-spacing:.04em;
      line-height:1.02;
    }
    .title span{
      display:block;
      color:#8ec5ff;
      margin-top:6px;
    }
    .line{
      width:94px;
      height:4px;
      border-radius:999px;
      margin:14px 0 12px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }
    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:1rem;
      max-width:560px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:22px;
      padding:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }
    .card h2{
      margin:0 0 8px;
      font-size:1.15rem;
      font-weight:900;
    }
    .card p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.5;
    }
    .field-label{
      display:block;
      margin:12px 0 8px;
      font-size:.84rem;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#dce6f8;
    }
    .field{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:0 14px;
      font-size:1rem;
      outline:none;
    }
    .field::placeholder{color:#9fb0cb}
    .btn{
      width:100%;
      margin-top:18px;
      min-height:54px;
      border:0;
      border-radius:16px;
      font-size:1rem;
      font-weight:900;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg,#5aa7ff 0%, #8cc8ff 100%);
      box-shadow:0 14px 28px rgba(90,167,255,.22);
    }
    #ownerLoginResult{
      margin-top:14px;
      min-height:24px;
      font-size:.95rem;
      line-height:1.45;
      color:var(--muted);
    }
    #ownerLoginResult.error{color:var(--danger)}
    #ownerLoginResult.ok{color:var(--ok)}
    @media (max-width:700px){
      .shell{width:min(760px,calc(100% - 12px))}
      .head,.wrap{padding-left:16px;padding-right:16px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="head">
        <h1 class="title">VERIFICA<span>ACCESSO</span></h1>
        <div class="line"></div>
        <p class="sub">Richiesto una sola volta alla prima installazione per verificare il tuo accesso personale.</p>
      </div>

      <div class="wrap">
        <div class="card">
          <h2>Accesso proprietario</h2>
          <p>Inserisci il numero di telefono associato al veicolo e la targa. Dopo questa verifica iniziale potrai accedere più rapidamente dal tuo dispositivo.</p>

          <label class="field-label" for="ownerPhone">Cellulare</label>
          <input id="ownerPhone" class="field" type="text" inputmode="tel" autocomplete="tel" placeholder="Es. 39 335 123456789">

          <label class="field-label" for="ownerPlate">Targa veicolo</label>
          <input id="ownerPlate" class="field" type="text" autocomplete="off" placeholder="Es. GX 888 TG" style="text-transform:uppercase">

          <button class="btn" id="ownerLoginBtn" type="button">Accedi</button>

          <div id="ownerLoginResult"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      // Auto-redirect disattivato temporaneamente per permettere il test manuale
      // del login con cellulare e targa.
    })();



function readOwnerCookie(name) {
  try {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.$?*|{}()\\[\\]\\\\/+^]/g, '\\$&') + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : '';
  } catch (e) {
    return '';
  }
}

(function prefillOwnerLoginFields(){
  try {
    const params = new URLSearchParams(window.location.search);

    const phoneInput = document.getElementById('ownerPhone');
    const plateInput = document.getElementById('ownerPlate');

    const savedPhone = localStorage.getItem('owner_saved_phone') || readOwnerCookie('owner_saved_phone') || '';
    const savedPlate = localStorage.getItem('owner_saved_plate') || readOwnerCookie('owner_saved_plate') || '';

    const urlPhone = params.get('phone') || params.get('telefono') || '';
    const urlPlate = params.get('plate') || params.get('targa') || '';

    if (phoneInput) {
      phoneInput.value = (urlPhone || savedPhone || '').trim();
    }

    if (plateInput) {
      plateInput.value = (urlPlate || savedPlate || '').trim().toUpperCase();
    }

    const result = document.getElementById('ownerLoginResult');
    if (result && (phoneInput?.value || plateInput?.value)) {
      result.textContent = 'Dati veicolo recuperati. Controlla e conferma l’accesso.';
    }
  } catch (e) {}
})();

document.getElementById('ownerLoginBtn').addEventListener('click', async () => {
      const phone = document.getElementById('ownerPhone').value.trim();
      const plate = document.getElementById('ownerPlate').value.trim();
      const result = document.getElementById('ownerLoginResult');

      result.className = '';
      result.textContent = '';

      if (!phone || !plate) {
        result.className = 'error';
        result.textContent = 'Inserisci cellulare e targa.';
        return;
      }

      try {
        result.textContent = 'Verifica in corso...';

        const res = await fetch('/api/owner-login-phone-plate', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ phone, plate })
        });

        const out = await res.json().catch(() => ({}));

        if (!res.ok || !out.success || !out.redirect_url) {
          result.className = 'error';
          result.textContent = out.error || 'Cellulare o targa non riconosciuti.';
          return;
        }

        const tokenMatch = String(out.redirect_url).match(/\/owner-access\/([^/?#]+)/);
        if (tokenMatch && tokenMatch[1]) {
          localStorage.setItem('owner_access_token', tokenMatch[1]);
        }

        try {
          localStorage.setItem('owner_saved_phone', phone);
          localStorage.setItem('owner_saved_plate', plate.toUpperCase().replace(/\s+/g, ''));
          localStorage.setItem('owner_login_saved_at', new Date().toISOString());
        } catch (e) {}

        result.className = 'ok';
        result.textContent = 'Accesso riconosciuto. Reindirizzamento...';
        window.location.href = out.redirect_url;
      } catch (err) {
        result.className = 'error';
        result.textContent = 'Errore di collegamento durante l’accesso.';
      }
    });
  </script>

<script>
(function(){
  try {
    const params = new URLSearchParams(window.location.search);

    const hasPrefillContext =
      params.has('phone') ||
      params.has('telefono') ||
      params.has('plate') ||
      params.has('targa') ||
      params.has('code');

    // Se la pagina login arriva con dati da precompilare, NON fare redirect automatico.
    // L'utente deve poter vedere e confermare cellulare e targa.
    if (hasPrefillContext) {
      return;
    }

    const savedToken = localStorage.getItem('owner_access_token') || '';
    if (savedToken) {
      window.location.replace('/owner-access/' + encodeURIComponent(savedToken));
    }
  } catch (e) {}
})();
</script>

</body>
</html>
