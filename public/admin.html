<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        Area amministratore
        <small>Ricerca e riattivazione codici</small>
      </div>
      <div class="nav-links">
        <a href="/">Acquisto</a>
        <a href="/activate.html">Attivazione</a>
        <a href="/admin.html">Admin</a>
      </div>
    </div>

    <section class="hero">
      <h1>Gestione codici e correzione attivazioni.</h1>
      <p>
        Cerca un codice esistente, visualizza i dati associati e riattivalo se il cliente ha inserito
        informazioni errate.
      </p>
    </section>

    <div class="grid">
      <section class="card" id="adminLoginBox">
        <h2>Accesso admin</h2>

        <div class="field">
          <label class="label" for="admin_email">Email amministratore</label>
          <input class="input" id="admin_email" type="email" placeholder="Email admin">
        </div>

        <div class="field">
          <label class="label" for="admin_password">Password</label>
          <input class="input" id="admin_password" type="password" placeholder="Password">
        </div>

        <input id="admin_test_code" type="hidden" value="TEST-CODE">

        <button id="adminLoginBtn" class="btn btn-primary btn-full" type="button">Accedi</button>

        <div id="adminLoginResult"></div>
      </section>

      <section class="card" id="adminPanel" style="display:none;">
        <h2>Ricerca codice</h2>

        <div class="field">
          <label class="label" for="search_code">Codice</label>
          <input class="input" id="search_code" type="text" placeholder="Es. AMC-XXXXXXXX">
        </div>

        <button id="findCodeBtn" class="btn btn-secondary btn-full" type="button">Cerca codice</button>

        <div id="findCodeResult"></div>
      </section>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
