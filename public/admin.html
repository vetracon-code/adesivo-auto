<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard Admin</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        Dashboard Admin
        <small>Gestione codici, attivazioni e scansioni</small>
      </div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/activate.html">Attivazione</a>
        <a href="/admin.html">Dashboard</a>
      </div>
    </div>

    <section class="hero">
      <h1>Controllo completo del sistema</h1>
      <p>
        Accedi, cerca un codice, verifica lo stato, controlla le scansioni registrate
        e riattiva il codice se necessario.
      </p>
    </section>

    <div class="grid">
      <section class="card" id="adminLoginBox">
        <h2>Accesso amministratore</h2>

        <div class="field">
          <label class="label" for="admin_email">Email amministratore</label>
          <input class="input" id="admin_email" type="email" placeholder="Email admin">
        </div>

        <div class="field">
          <label class="label" for="admin_password">Password amministratore</label>
          <input class="input" id="admin_password" type="password" placeholder="Password">
        </div>

        <button id="adminLoginBtn" class="btn btn-primary btn-full" type="button">Accedi</button>
        <div id="adminLoginResult"></div>
      </section>

      <section class="card" id="adminPanel" style="display:none;">
        <h2>Ricerca codice</h2>

        <div class="field">
          <label class="label" for="search_code">Codice da cercare</label>
          <input class="input" id="search_code" type="text" placeholder="Es. AMC-XXXXXXXX">
        </div>

        <button id="findCodeBtn" class="btn btn-secondary btn-full" type="button">Cerca codice</button>

        <div id="findCodeResult"></div>

        <div id="scanStatsBox" style="display:none; margin-top:20px;">
          <h3>Statistiche scansioni</h3>
          <div id="scanStatsResult"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
