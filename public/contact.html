<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segnalazione veicolo</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    padding: 20px;
    text-align: center;
}

.card {
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 { font-size: 22px; }

.car { font-weight: 600; margin-top: 10px; }
.plate { color: #666; margin-bottom: 20px; }

select, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: #25D366;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
}
</style>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
</head>

<body>

<div class="card">
    <h1>🚗 Segnala un problema</h1>

    <div class="car" id="vehicle"></div>
    <div class="plate" id="plate"></div>

    <select id="reason">
        <option value="">Motivo segnalazione</option>
        <option>Urtata accidentalmente</option>
        <option>Furto in corso</option>
        <option>Intralcio al traffico</option>
        <option>Rimozione forzata</option>
        <option>Emergenza</option>
    </select>

    <textarea id="msg" placeholder="Messaggio opzionale"></textarea>

    <button onclick="go()">Contatta su WhatsApp</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const phone = params.get('phone');
const plate = params.get('plate');
const vehicle = params.get('vehicle');

document.getElementById('plate').innerText = plate || '';
document.getElementById('vehicle').innerText = vehicle || '';

function go(){
    let reason = document.getElementById('reason').value;
    let msg = document.getElementById('msg').value;

    let text = `Segnalazione per ${vehicle} (${plate})\n`;
    if(reason) text += `Motivo: ${reason}\n`;
    if(msg) text += msg;

    window.location.href = `https://wa.me/${phone}?text=` + encodeURIComponent(text);
}
</script>

</body>
</html>
