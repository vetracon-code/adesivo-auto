<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Feedback servizio QR veicolo</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    :root{
      --accent:#2c74ff; --accent2:#5aa0ff; --bg1:#050b14; --bg2:#0a1320;
      --line:rgba(255,255,255,.10); --text:#f7fbff; --muted:#b6c2d4;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 18% 0%, rgba(33,78,166,.22), transparent 28%),linear-gradient(180deg,var(--bg1) 0%,#07101b 48%,var(--bg2) 100%);color:var(--text)}
    .wrap{width:min(900px,calc(100% - 24px));margin:0 auto;padding:32px 0 40px}
    .panel{border-radius:30px;overflow:hidden;background:linear-gradient(180deg, rgba(11,21,35,.99) 0%, rgba(8,16,27,.995) 100%);border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 56px rgba(0,0,0,.38);padding:30px 26px 28px}
    h1{margin:0;line-height:.95;letter-spacing:-.06em;font-weight:900;font-size:clamp(2.2rem,5.2vw,3.8rem);text-transform:uppercase}
    h1 span{display:block;margin-top:6px;color:var(--accent2)}
    .line{width:62px;height:5px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));margin:18px 0 14px}
    .sub{margin:0 0 22px;color:var(--muted);line-height:1.6}
    .field{width:100%;min-height:52px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;padding:0 14px;margin-bottom:12px}
    textarea.field{padding:12px 14px;min-height:140px;resize:vertical}
    .btn{min-height:52px;padding:0 18px;border-radius:14px;border:0;cursor:pointer;color:#fff;font-weight:900;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%)}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>FEEDBACK<span>SERVIZIO</span></h1>
      <div class="line"></div>
      <p class="sub">Questa pagina serve a raccogliere, in modo semplice e riservato, i motivi per cui non desideri rinnovare o proseguire il servizio.</p>

      <select id="reason" class="field">
        <option value="">Seleziona il motivo principale</option>
        <option value="prezzo_troppo_alto">Prezzo troppo alto</option>
        <option value="non_mi_serve">Non mi serve più</option>
        <option value="non_l_ho_usato">Non l'ho ancora usato abbastanza</option>
        <option value="preferisco_altro">Preferisco un altro sistema</option>
        <option value="difficolta_tecniche">Ho avuto difficoltà tecniche</option>
        <option value="altro">Altro</option>
      </select>

      <textarea id="notes" class="field" placeholder="Se vuoi, aggiungi un commento libero..."></textarea>
      <button id="sendFeedbackBtn" class="btn" type="button">Invia feedback</button>
      <div id="feedbackResult" class="muted" style="margin-top:14px;"></div>
    </div>
  </div>

  <script>
    const pathMatch = window.location.pathname.match(/\/feedback\/u\/([A-Z0-9]+)/i);
    const publicId = pathMatch ? pathMatch[1].trim().toUpperCase() : '';

    document.getElementById('sendFeedbackBtn').addEventListener('click', async () => {
      const reason = document.getElementById('reason').value;
      const notes = document.getElementById('notes').value.trim();
      const result = document.getElementById('feedbackResult');
      result.textContent = 'Invio in corso...';

      try {
        const res = await fetch('/api/public-feedback', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ public_id: publicId, reason, notes })
        });
        const data = await res.json();
        result.textContent = data.success ? 'Feedback ricevuto. Grazie.' : (data.error || 'Errore invio feedback.');
      } catch (e) {
        result.textContent = 'Errore di comunicazione con il server.';
      }
    });
  </script>
</body>
</html>
