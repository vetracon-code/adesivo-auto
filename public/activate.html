<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Attiva adesivo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        Attivazione adesivo
        <small>Associa il codice al veicolo</small>
      </div>
      <div class="nav-links">
        <a href="/">Acquisto</a>
        <a href="/activate.html">Attivazione</a>
        <a href="/admin.html">Admin</a>
      </div>
    </div>

    <section class="hero">
      <h1>Attiva il codice e collega il veicolo al QR.</h1>
      <p>
        Inserisci il codice ricevuto, verifica che sia valido e completa i dati del veicolo.
        Al termine potrai aprire e stampare l’adesivo.
      </p>
    </section>

    <div class="grid single">
      <section class="card">
        <form id="activateForm">
          <div class="row">
            <div class="field">
              <label class="label" for="code">Codice univoco</label>
              <input class="input" id="code" name="code" type="text" placeholder="Es. AMC-XXXXXXXX">
            </div>
            <div class="field" style="display:flex;align-items:flex-end;">
              <button id="checkCodeBtn" class="btn btn-secondary btn-full" type="button">Verifica codice</button>
            </div>
          </div>

          <div id="vehicleFields" style="display:none;">
            <div class="row">
              <div class="field">
                <label class="label" for="plate">Targa</label>
                <input class="input" id="plate" name="plate" type="text" placeholder="Es. SW018SW">
              </div>
              <div class="field">
                <label class="label" for="vehicle_model">Veicolo</label>
                <input class="input" id="vehicle_model" name="vehicle_model" type="text" placeholder="Es. Audi A8">
              </div>
            </div>

            <div class="field">
              <label class="label" for="phone">Numero WhatsApp</label>
              <input class="input" id="phone" name="phone" type="text" placeholder="Es. +393936664998">
            </div>

            <button id="activateBtn" class="btn btn-primary btn-full" type="submit">Attiva adesivo</button>
          </div>
        </form>

        <div id="activateResult"></div>
      </section>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
